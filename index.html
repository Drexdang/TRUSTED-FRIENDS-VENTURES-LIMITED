<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trusted Friends Loan Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- jsPDF & autoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <!-- Our scripts (order matters) -->
    <script src="js/firebase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pdf.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/loans.js"></script>
    <script src="js/expenses.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/app.js"></script>
    <style>
        #toast { transition: opacity 0.3s; }
        /* Ensure charts have a fixed height */
        canvas { max-height: 400px; width: 100%; }
        .chart-container { height: 400px; }
        /* Mobile-friendly table scrolling */
        .overflow-x-auto { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-gray-100" x-data="app" x-init="init">
    <!-- Toast container -->
    <div id="toast" class="hidden fixed top-4 right-4 z-50 p-4 rounded-lg shadow-lg text-white"></div>

    <!-- Navigation Bar (visible when logged in) -->
    <nav class="bg-indigo-600 text-white p-4 shadow-lg" x-show="user">
        <div class="container mx-auto">
            <!-- Top row: logo and logout (mobile: column) -->
            <div class="flex flex-col md:flex-row md:justify-between md:items-center space-y-2 md:space-y-0">
                <div class="flex items-center space-x-2">
                    <!-- Logo -->
                    <img src="logo.jpg" alt="Logo" class="h-10 w-auto" onerror="this.style.display='none'">
                    <div>
                        <h1 class="text-2xl font-bold">💰 Trusted Friends Loan Manager</h1>
                        <p class="text-xs text-indigo-200">RC: 9384125</p>
                    </div>
                </div>
                <button @click="logout" class="bg-red-500 px-3 py-1 rounded hover:bg-red-600 self-start md:self-auto">Logout</button>
            </div>
            <!-- Navigation buttons: wrap on mobile -->
            <div class="flex flex-wrap gap-2 mt-2">
                <button @click="page='dashboard'" class="hover:underline px-2 py-1" :class="{'font-bold bg-indigo-700 rounded': page==='dashboard'}">Dashboard</button>
                <button @click="page='loans'" class="hover:underline px-2 py-1" :class="{'font-bold bg-indigo-700 rounded': page==='loans'}">Loans</button>
                <button @click="page='expenses'" class="hover:underline px-2 py-1" :class="{'font-bold bg-indigo-700 rounded': page==='expenses'}">Expenses</button>
                <button @click="page='reports'" class="hover:underline px-2 py-1" :class="{'font-bold bg-indigo-700 rounded': page==='reports'}">Reports</button>
                <button @click="page='admin'" class="hover:underline px-2 py-1" :class="{'font-bold bg-indigo-700 rounded': page==='admin'}" x-show="isAdmin">Admin</button>
            </div>
        </div>
    </nav>

    <!-- Login Page -->
    <div x-show="!user" class="container mx-auto p-8 max-w-md">
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-2xl font-bold mb-4">Login</h2>
            <form @submit.prevent="login">
                <div class="mb-4">
                    <label class="block text-gray-700">Email</label>
                    <input type="email" x-model="loginEmail" class="w-full border rounded p-2" required>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700">Password</label>
                    <input type="password" x-model="loginPassword" class="w-full border rounded p-2" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-indigo-700">Login</button>
            </form>
            <p class="mt-4 text-center text-gray-600">Use credentials from Firebase Authentication</p>
        </div>
    </div>

    <!-- Main App Pages -->
    <div x-show="user" class="container mx-auto p-4">
        <!-- Dashboard Page -->
        <template x-if="page === 'dashboard'">
            <div x-data="dashboard" x-init="init" class="space-y-6">
                <h1 class="text-3xl font-bold">Dashboard</h1>
                <!-- KPI cards: stack on mobile, grid on larger -->
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div class="bg-white p-4 rounded shadow">
                        <p class="text-gray-600">Total Principal</p>
                        <p class="text-2xl font-bold" x-text="formatCurrency(totalPrincipal)"></p>
                    </div>
                    <div class="bg-white p-4 rounded shadow">
                        <p class="text-gray-600">Outstanding Balance</p>
                        <p class="text-2xl font-bold" x-text="formatCurrency(totalBalance)"></p>
                        <p class="text-sm text-gray-500" x-show="totalPrincipal>0" x-text="`${principalPercent}% of principal`"></p>
                    </div>
                    <div class="bg-white p-4 rounded shadow">
                        <p class="text-gray-600">Total Interest</p>
                        <p class="text-2xl font-bold" x-text="formatCurrency(totalInterest)"></p>
                    </div>
                    <div class="bg-white p-4 rounded shadow">
                        <p class="text-gray-600">Total Repaid</p>
                        <p class="text-2xl font-bold" x-text="formatCurrency(totalPaid)"></p>
                    </div>
                </div>
                <!-- Charts: stack on mobile, two columns on large -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-4 rounded shadow chart-container">
                        <h2 class="text-xl font-semibold mb-2">Balance Trend</h2>
                        <canvas id="balanceChart"></canvas>
                    </div>
                    <div class="bg-white p-4 rounded shadow chart-container">
                        <h2 class="text-xl font-semibold mb-2">Top Clients by Balance</h2>
                        <canvas id="topClientsChart"></canvas>
                    </div>
                </div>
                <div class="bg-white p-4 rounded shadow chart-container">
                    <h2 class="text-xl font-semibold mb-2">Balance Distribution</h2>
                    <canvas id="balancePieChart"></canvas>
                </div>
            </div>
        </template>

       <!-- Loans Page -->
<template x-if="page === 'loans'">
    <div x-data="loans" x-init="init" class="space-y-6">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
            <h1 class="text-3xl font-bold">Loan Records</h1>
            <button @click="showAddForm = !showAddForm" class="bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700 w-full sm:w-auto">
                <span x-text="showAddForm ? 'Cancel' : '+ Add Loan'"></span>
            </button>
        </div>
        <!-- Add Form -->
        <div x-show="showAddForm" class="bg-white p-6 rounded shadow">
            <h2 class="text-xl font-bold mb-4">New Loan</h2>
            <form @submit.prevent="addLoan">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block">Client Name *</label><input type="text" x-model="formData.names" class="w-full border p-2 rounded" required></div>
                    <div><label class="block">Date</label><input type="date" x-model="formData.date" class="w-full border p-2 rounded"></div>
                    <div><label class="block">Amount (₦)</label><input type="number" step="0.01" x-model="formData.amount" class="w-full border p-2 rounded" required></div>
                    <div><label class="block">Interest Rate %</label><input type="number" step="0.01" x-model="formData.int_rate" class="w-full border p-2 rounded"></div>
                    <div><label class="block">Duration (months)</label><input type="number" step="1" x-model="formData.duration" class="w-full border p-2 rounded"></div>
                    <div><label class="block">Admin Fees (₦)</label><input type="number" step="0.01" x-model="formData.admin_fees" class="w-full border p-2 rounded"></div>
                    <div><label class="block">Already Paid (₦)</label><input type="number" step="0.01" x-model="formData.amt_remitted" class="w-full border p-2 rounded"></div>
                    <!-- Manual Penalty field -->
                    <div><label class="block">Manual Penalty (₦)</label><input type="number" step="0.01" x-model="formData.manual_penalty" class="w-full border p-2 rounded"></div>
                </div>
                <button type="submit" class="mt-4 bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 w-full sm:w-auto">Save Loan</button>
            </form>
        </div>
        <div><input type="text" placeholder="Search by name or SN" x-model="search" class="w-full md:w-1/3 border p-2 rounded"></div>
        <!-- Loans Table -->
        <div class="bg-white rounded shadow overflow-x-auto">
            <table class="min-w-full">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-4 py-2 text-left">SN</th>
                        <th>Name</th>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Rate</th>
                        <th>Dur</th>
                        <th>Admin</th>
                        <th>Interest</th>
                        <th>Auto Penalty</th>
                        <th>Manual Penalty</th>
                        <th>Paid</th>          <!-- Paid moved before Total -->
                        <th>Total</th>
                        <th>Balance</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="loan in filteredLoans" :key="loan.id">
                        <tr class="border-t">
                            <td class="px-4 py-2" x-text="loan.sn"></td>
                            <td x-text="loan.names"></td>
                            <td x-text="loan.date ? new Date(loan.date.seconds*1000).toLocaleDateString() : ''"></td>
                            <td x-text="formatCurrency(loan.amount)"></td>
                            <td x-text="loan.int_rate + '%'"></td>
                            <td x-text="loan.duration"></td>
                            <td x-text="formatCurrency(loan.admin_fees)"></td>
                            <td x-text="formatCurrency(loan.interest)"></td>
                            <td x-text="formatCurrency(loan.auto_penalty || 0)"></td>
                            <td x-text="formatCurrency(loan.manual_penalty || 0)"></td>
                            <td x-text="formatCurrency(loan.amt_remitted)"></td>   <!-- Paid -->
                            <td x-text="formatCurrency(loan.g_total)"></td>        <!-- Total -->
                            <td x-text="formatCurrency(loan.balance)"></td>        <!-- Balance -->
                            <td>
                                <button @click="editLoan(loan)" class="text-indigo-600 mr-2">Edit</button>
                                <button @click="deleteLoan(loan)" class="text-red-600">Delete</button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        <!-- Edit Modal -->
        <div x-show="showEditForm" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
            <div class="bg-white rounded-lg p-6 max-w-2xl w-full">
                <h2 class="text-xl font-bold mb-4">Edit Loan SN <span x-text="editingLoan?.sn"></span></h2>
                <form @submit.prevent="updateLoan">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label>Name</label><input type="text" x-model="editFormData.names" class="w-full border p-2 rounded"></div>
                        <div><label>Date</label><input type="date" x-model="editFormData.date" class="w-full border p-2 rounded"></div>
                        <div><label>Amount</label><input type="number" step="0.01" x-model="editFormData.amount" class="w-full border p-2 rounded"></div>
                        <div><label>Rate %</label><input type="number" step="0.01" x-model="editFormData.int_rate" class="w-full border p-2 rounded"></div>
                        <div><label>Duration</label><input type="number" step="1" x-model="editFormData.duration" class="w-full border p-2 rounded"></div>
                        <div><label>Admin Fees</label><input type="number" step="0.01" x-model="editFormData.admin_fees" class="w-full border p-2 rounded"></div>
                        <div><label>Already Paid</label><input type="number" step="0.01" x-model="editFormData.amt_remitted" class="w-full border p-2 rounded"></div>
                        <!-- Auto Penalty (editable) -->
                        <div><label>Auto Penalty (₦)</label><input type="number" step="0.01" x-model="editFormData.auto_penalty" class="w-full border p-2 rounded"></div>
                        <!-- Manual Penalty (editable) -->
                        <div><label>Manual Penalty (₦)</label><input type="number" step="0.01" x-model="editFormData.manual_penalty" class="w-full border p-2 rounded"></div>
                    </div>
                    <div class="mt-4 flex space-x-2">
                        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">Update</button>
                        <button type="button" @click="showEditForm = false; editingLoan = null" class="bg-gray-300 px-4 py-2 rounded">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</template>

        <!-- Expenses & Income & Equity Page -->
        <template x-if="page === 'expenses'">
            <div x-data="expenses" x-init="init" class="space-y-6">
                <h1 class="text-3xl font-bold">Expenses, Income & Equity</h1>
                <!-- Tab buttons: wrap on mobile -->
                <div class="flex flex-wrap space-x-4 border-b">
                    <button @click="activeTab='expenses'" :class="{'font-bold border-b-2 border-indigo-600': activeTab==='expenses'}" class="pb-2 px-4">Expenses</button>
                    <button @click="activeTab='income'" :class="{'font-bold border-b-2 border-indigo-600': activeTab==='income'}" class="pb-2 px-4">Other Income</button>
                    <button @click="activeTab='equity'" :class="{'font-bold border-b-2 border-indigo-600': activeTab==='equity'}" class="pb-2 px-4">Equity</button>
                </div>
                
                <!-- Expenses Tab -->
                <div x-show="activeTab === 'expenses'">
                    <form @submit.prevent="addExpense" class="bg-white p-4 rounded shadow mb-4 grid grid-cols-1 md:grid-cols-5 gap-2">
                        <select x-model="expenseForm.category" required class="border p-2 rounded">
                            <option value="">Category</option>
                            <option>Allowances</option>
                            <option>Social Support</option>
                            <option>Administrative Expenses</option>
                            <option>Drawings</option>
                            <option>Other</option>
                        </select>
                        <input type="number" step="0.01" x-model="expenseForm.amount" placeholder="Amount" required class="border p-2 rounded">
                        <input type="date" x-model="expenseForm.date" class="border p-2 rounded">
                        <input type="text" x-model="expenseForm.description" placeholder="Description" class="border p-2 rounded">
                        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">Add Expense</button>
                    </form>
                    <div class="bg-white rounded shadow overflow-x-auto">
                        <table class="min-w-full">
                            <thead><tr><th>Category</th><th>Amount</th><th>Date</th><th>Description</th></tr></thead>
                            <tbody>
                                <template x-for="exp in expenses" :key="exp.id">
                                    <tr><td x-text="exp.category"></td><td x-text="formatCurrency(exp.amount)"></td><td x-text="exp.date?.toDate().toLocaleDateString()"></td><td x-text="exp.description"></td></tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- Income Tab -->
                <div x-show="activeTab === 'income'">
                    <form @submit.prevent="addIncome" class="bg-white p-4 rounded shadow mb-4 grid grid-cols-1 md:grid-cols-5 gap-2">
                        <select x-model="incomeForm.category" required class="border p-2 rounded">
                            <option value="">Category</option>
                            <option>Other Income</option>
                            <option>Loan Recovery Fees</option>
                            <option>Consultancy Income</option>
                            <option>Investment Income</option>
                            <option>Custom</option>
                        </select>
                        <input type="number" step="0.01" x-model="incomeForm.amount" placeholder="Amount" required class="border p-2 rounded">
                        <input type="date" x-model="incomeForm.date" class="border p-2 rounded">
                        <input type="text" x-model="incomeForm.description" placeholder="Description" class="border p-2 rounded">
                        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">Add Income</button>
                    </form>
                    <div class="bg-white rounded shadow overflow-x-auto">
                        <table class="min-w-full">
                            <thead><tr><th>Category</th><th>Amount</th><th>Date</th><th>Description</th></tr></thead>
                            <tbody>
                                <template x-for="inc in otherIncome" :key="inc.id">
                                    <tr><td x-text="inc.category"></td><td x-text="formatCurrency(inc.amount)"></td><td x-text="inc.date?.toDate().toLocaleDateString()"></td><td x-text="inc.description"></td></tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- Equity Tab -->
                <div x-show="activeTab === 'equity'">
                    <!-- Add transaction form -->
                    <form @submit.prevent="addEquityTransaction" class="bg-white p-4 rounded shadow mb-4 grid grid-cols-1 md:grid-cols-6 gap-2">
                        <select x-model="equityForm.owner" required class="border p-2 rounded">
                            <option value="">Select Owner</option>
                            <template x-for="owner in owners" :key="owner">
                                <option x-text="owner" :value="owner"></option>
                            </template>
                        </select>
                        <select x-model="equityForm.type" class="border p-2 rounded">
                            <option value="contribution">Contribution</option>
                            <option value="drawing">Drawing</option>
                        </select>
                        <input type="number" step="0.01" x-model="equityForm.amount" placeholder="Amount" required class="border p-2 rounded">
                        <input type="date" x-model="equityForm.date" class="border p-2 rounded">
                        <input type="text" x-model="equityForm.description" placeholder="Description" class="border p-2 rounded">
                        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">Add</button>
                    </form>
                    
                    <!-- Cumulative Summary (clickable names) -->
                    <div class="bg-white p-4 rounded shadow mb-4">
                        <h2 class="text-lg font-semibold mb-2">Cumulative Net Equity by Owner</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <template x-for="(value, owner) in equitySummary" :key="owner">
                                <div class="flex justify-between border-b py-2 cursor-pointer hover:bg-gray-100" @click="viewOwner(owner)">
                                    <span x-text="owner" class="font-medium"></span>
                                    <span x-text="formatCurrency(value)" :class="{'text-green-600': value>=0, 'text-red-600': value<0}"></span>
                                </div>
                            </template>
                            <div class="flex justify-between font-bold border-t pt-2 col-span-2">
                                <span>Total Net Equity</span>
                                <span x-text="formatCurrency(totalEquity)"></span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Transaction History -->
                    <div class="bg-white rounded shadow overflow-x-auto">
                        <h2 class="text-lg font-semibold p-4">All Transactions</h2>
                        <table class="min-w-full">
                            <thead><tr><th>Owner</th><th>Type</th><th>Amount</th><th>Date</th><th>Description</th><th>Actions</th></tr></thead>
                            <tbody>
                                <template x-for="tx in equityTransactions" :key="tx.id">
                                    <tr>
                                        <td x-text="tx.owner"></td>
                                        <td x-text="tx.type"></td>
                                        <td x-text="formatCurrency(tx.amount)"></td>
                                        <td x-text="tx.date?.toDate().toLocaleDateString()"></td>
                                        <td x-text="tx.description"></td>
                                        <td>
                                            <button @click="editTransaction(tx)" class="text-indigo-600 mr-2">Edit</button>
                                            <button @click="deleteTransaction(tx)" class="text-red-600">Delete</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Owner Detail Modal -->
                    <div x-show="showOwnerDetail" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                        <div class="bg-white rounded-lg p-6 max-w-4xl w-full max-h-screen overflow-y-auto">
                            <div class="flex justify-between items-center mb-4">
                                <h2 class="text-2xl font-bold" x-text="selectedOwner"></h2>
                                <button @click="showOwnerDetail = false" class="text-gray-500 hover:text-gray-700">✕</button>
                            </div>
                            <div class="mb-4 flex justify-between items-center">
                                <p class="text-lg">Net Equity: <span x-text="formatCurrency(ownerNet)" :class="{'text-green-600': ownerNet>=0, 'text-red-600': ownerNet<0}"></span></p>
                                <button @click="printOwnerStatement" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Print Statement</button>
                            </div>
                            <table class="min-w-full border">
                                <thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Description</th><th>Actions</th></tr></thead>
                                <tbody>
                                    <template x-for="tx in ownerTransactions" :key="tx.id">
                                        <tr>
                                            <td x-text="tx.date?.toDate().toLocaleDateString()"></td>
                                            <td x-text="tx.type"></td>
                                            <td x-text="formatCurrency(tx.amount)"></td>
                                            <td x-text="tx.description"></td>
                                            <td>
                                                <button @click="editTransaction(tx)" class="text-indigo-600 mr-2">Edit</button>
                                                <button @click="deleteTransaction(tx)" class="text-red-600">Delete</button>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <!-- Edit Transaction Modal -->
                    <div x-show="showEditModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                        <div class="bg-white rounded-lg p-6 max-w-md w-full">
                            <h2 class="text-xl font-bold mb-4">Edit Transaction</h2>
                            <form @submit.prevent="updateTransaction">
                                <div class="space-y-2">
                                    <div>
                                        <label class="block">Owner</label>
                                        <select x-model="editForm.owner" class="w-full border p-2 rounded" required>
                                            <template x-for="owner in owners" :key="owner">
                                                <option x-text="owner" :value="owner"></option>
                                            </template>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block">Type</label>
                                        <select x-model="editForm.type" class="w-full border p-2 rounded">
                                            <option value="contribution">Contribution</option>
                                            <option value="drawing">Drawing</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block">Amount (₦)</label>
                                        <input type="number" step="0.01" x-model="editForm.amount" class="w-full border p-2 rounded" required>
                                    </div>
                                    <div>
                                        <label class="block">Date</label>
                                        <input type="date" x-model="editForm.date" class="w-full border p-2 rounded" required>
                                    </div>
                                    <div>
                                        <label class="block">Description</label>
                                        <input type="text" x-model="editForm.description" class="w-full border p-2 rounded">
                                    </div>
                                </div>
                                <div class="mt-4 flex space-x-2">
                                    <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">Update</button>
                                    <button type="button" @click="showEditModal = false; editingTransaction = null" class="bg-gray-300 px-4 py-2 rounded">Cancel</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </template>

        <!-- Reports Page -->
        <template x-if="page === 'reports'">
            <div x-data="reports" x-init="init" class="space-y-6">
                <h1 class="text-3xl font-bold">Reports</h1>
                <div class="flex space-x-4 border-b">
                    <button @click="activeReport='client'" :class="{'font-bold border-b-2 border-indigo-600': activeReport==='client'}" class="pb-2 px-4">Client Loan Report</button>
                    <button @click="activeReport='pl'" :class="{'font-bold border-b-2 border-indigo-600': activeReport==='pl'}" class="pb-2 px-4">Profit & Loss</button>
                </div>
                <!-- Client Report -->
                <div x-show="activeReport === 'client'">
                    <div class="bg-white p-4 rounded shadow">
                        <div class="flex space-x-2 mb-4">
                            <input type="number" x-model="searchSN" placeholder="Enter Loan SN" class="border p-2 rounded w-64">
                            <button @click="searchLoan" class="bg-indigo-600 text-white px-4 py-2 rounded">Search</button>
                        </div>
                        <template x-if="selectedLoan">
                            <div>
                                <h2 class="text-xl font-semibold mb-2">Loan Details</h2>
                                <p><strong>SN:</strong> <span x-text="selectedLoan.sn"></span></p>
                                <p><strong>Client:</strong> <span x-text="selectedLoan.names"></span></p>
                                <p><strong>Balance:</strong> <span x-text="formatCurrency(selectedLoan.balance)"></span></p>
                                <div class="mt-4 space-x-2">
                                    <button @click="downloadClientPDF" class="bg-green-600 text-white px-4 py-2 rounded">Download PDF</button>
                                    <button @click="downloadClientCSV" class="bg-blue-600 text-white px-4 py-2 rounded">Download CSV</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <!-- P&L Report -->
                <div x-show="activeReport === 'pl'">
                    <div class="bg-white p-4 rounded shadow">
                        <div class="flex space-x-4 mb-4">
                            <select x-model="period" class="border p-2 rounded">
                                <option value="all">All Time</option>
                                <option value="year">This Year</option>
                                <option value="12months">Last 12 Months</option>
                                <option value="custom">Custom Range</option>
                            </select>
                            <template x-if="period === 'custom'">
                                <span>
                                    <input type="date" x-model="startDate" class="border p-2 rounded">
                                    <input type="date" x-model="endDate" class="border p-2 rounded">
                                </span>
                            </template>
                            <button @click="computePL" class="bg-indigo-600 text-white px-4 py-2 rounded">Generate Report</button>
                            <button @click="downloadPLPDF" class="bg-green-600 text-white px-4 py-2 rounded">PDF</button>
                            <button @click="downloadPLCSV" class="bg-blue-600 text-white px-4 py-2 rounded">CSV</button>
                        </div>
                        
                        <template x-if="plData">
                            <div class="mt-4">
                                <h2 class="text-xl font-bold mb-2">Profit & Loss Statement</h2>
                                <p class="text-sm text-gray-600 mb-4" x-text="'Period: ' + (period === 'all' ? 'All Time' : period === 'year' ? 'This Year' : period === '12months' ? 'Last 12 Months' : startDate + ' to ' + endDate)"></p>
                                
                                <!-- Revenue Section -->
                                <div class="mb-4">
                                    <h3 class="text-lg font-semibold bg-gray-100 p-2">REVENUE</h3>
                                    <table class="min-w-full">
                                        <tr><td class="py-1">Interest Income</td><td class="text-right" x-text="formatCurrency(plData.revenue?.interest || 0)"></td></tr>
                                        <tr><td class="py-1">Admin Fees</td><td class="text-right" x-text="formatCurrency(plData.revenue?.adminFees || 0)"></td></tr>
                                        <tr><td class="py-1">Penalty Income</td><td class="text-right" x-text="formatCurrency(plData.revenue?.penalty || 0)"></td></tr>
                                        <template x-for="(amt, cat) in plData.otherIncome" :key="cat">
                                            <tr><td class="py-1" x-text="cat"></td><td class="text-right" x-text="formatCurrency(amt)"></td></tr>
                                        </template>
                                        <tr class="font-bold border-t"><td class="py-2">Total Revenue</td><td class="text-right" x-text="formatCurrency(plData.totalRevenue || 0)"></td></tr>
                                    </table>
                                </div>
                                
                                <!-- Expenses Section -->
                                <div class="mb-4">
                                    <h3 class="text-lg font-semibold bg-gray-100 p-2">EXPENSES</h3>
                                    <table class="min-w-full">
                                        <template x-for="(amt, cat) in plData.expenses" :key="cat">
                                            <tr><td class="py-1" x-text="cat"></td><td class="text-right" x-text="formatCurrency(amt)"></td></tr>
                                        </template>
                                        <tr class="font-bold border-t"><td class="py-2">Total Expenses</td><td class="text-right" x-text="formatCurrency(plData.totalExpenses || 0)"></td></tr>
                                    </table>
                                </div>
                                
                                <!-- Net Operating Profit -->
                                <div class="mb-4 p-2 border rounded">
                                    <p class="text-lg"><span class="font-semibold">Net Operating Profit / (Loss):</span> <span :class="{'text-green-600': plData.netOperating >= 0, 'text-red-600': plData.netOperating < 0}" x-text="formatCurrency(plData.netOperating || 0)"></span></p>
                                </div>
                                
                                <!-- Equity Section -->
                                <div class="mb-4">
                                    <h3 class="text-lg font-semibold bg-gray-100 p-2">OWNER'S EQUITY (NET)</h3>
                                    <table class="min-w-full">
                                        <template x-for="(amt, owner) in plData.equityPerOwner" :key="owner">
                                            <tr><td class="py-1" x-text="owner"></td><td class="text-right" x-text="formatCurrency(amt)"></td></tr>
                                        </template>
                                        <tr class="font-bold border-t"><td class="py-2">Total Net Equity</td><td class="text-right" x-text="formatCurrency(plData.totalEquity || 0)"></td></tr>
                                    </table>
                                </div>
                                
                                <!-- Final Position -->
                                <div class="mt-4 p-3 bg-gray-50 rounded text-center">
                                    <p class="text-xl font-bold"><span class="font-semibold">Final Net Position:</span> <span :class="{'text-green-600': plData.finalPosition >= 0, 'text-red-600': plData.finalPosition < 0}" x-text="formatCurrency(plData.finalPosition || 0)"></span></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </div>
        </template>

        <!-- Admin Page (with editable equity owners) -->
        <template x-if="page === 'admin'">
            <div x-data="admin" x-init="init" class="space-y-6">
                <h1 class="text-3xl font-bold">Admin Controls</h1>
                
                <!-- User Management -->
                <div class="bg-white p-6 rounded shadow">
                    <h2 class="text-xl font-bold mb-4">Create New Admin User</h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-2">
                        <input type="email" x-model="newEmail" placeholder="Email" class="border p-2 rounded">
                        <input type="password" x-model="newPassword" placeholder="Password" class="border p-2 rounded">
                        <button @click="createUser" class="bg-indigo-600 text-white px-4 py-2 rounded">Create User</button>
                    </div>
                </div>
                
                <!-- Existing Users -->
                <div class="bg-white p-6 rounded shadow">
                    <h2 class="text-xl font-bold mb-4">Existing Users</h2>
                    <table class="min-w-full">
                        <thead><tr><th>Email</th><th>Role</th><th>Created</th><th>Actions</th></tr></thead>
                        <tbody>
                            <template x-for="user in users" :key="user.id">
                                <tr>
                                    <td x-text="user.email"></td>
                                    <td x-text="user.role"></td>
                                    <td x-text="user.createdAt?.toDate().toLocaleDateString()"></td>
                                    <td><button @click="deleteUser(user.id, user.uid)" class="text-red-600">Delete</button></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <!-- Equity Contributors Management -->
                <div class="bg-white p-6 rounded shadow">
                    <h2 class="text-xl font-bold mb-4">Equity Contributors</h2>
                    <p class="text-sm text-gray-600 mb-4">Edit the four names of people who contribute equity.</p>
                    <div class="space-y-2">
                        <template x-for="(owner, index) in equityOwners" :key="index">
                            <div class="flex items-center space-x-2">
                                <span class="w-8 text-gray-500" x-text="index + 1 + '.'"></span>
                                <input type="text" x-model="equityOwners[index]" class="flex-1 border p-2 rounded">
                            </div>
                        </template>
                        <button @click="saveEquityOwners" class="mt-4 bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Save Changes</button>
                    </div>
                </div>
            </div>
        </template>

        <!-- Footer (visible when logged in) -->
        <footer class="text-center text-gray-500 text-xs py-4 border-t mt-8">
            Trusted Friends Limited &copy; 2026 | RC: 9384125 | All rights reserved.
        </footer>
    </div>
</body>
</html>
