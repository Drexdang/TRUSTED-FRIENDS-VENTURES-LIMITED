<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Trusted Friends Loan Manager | Complete Financial Suite</title>
    <!-- Tailwind CSS + Font Awesome Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <!-- Alpine.js + Chart.js + jsPDF + autoTable + PapaParse -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        #toast { transition: opacity 0.3s; z-index: 9999; }
        .autocomplete-items { position: absolute; border: 1px solid #d4d4d4; border-top: none; z-index: 99; background: white; width: 100%; max-height: 200px; overflow-y: auto; }
        .autocomplete-items div { padding: 8px 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        .autocomplete-items div:hover { background-color: #e9e9e9; }
        .chart-container { height: 350px; position: relative; }
        @media print { .no-print { display: none; } body { background: white; } }
    </style>
</head>
<body class="bg-gray-100" x-data="app()" x-init="initApp" x-cloak>
    <div id="toast" class="hidden fixed top-4 right-4 z-50 p-4 rounded-lg shadow-lg text-white bg-gray-800"></div>

    <!-- Navigation Bar -->
    <nav class="bg-indigo-700 text-white p-4 shadow-lg" x-show="user">
        <div class="container mx-auto">
            <div class="flex flex-col md:flex-row justify-between items-center gap-2">
                <div class="flex items-center gap-3">
                    <i class="fas fa-hand-holding-usd text-2xl"></i>
                    <div>
                        <h1 class="text-2xl font-bold">Trusted Friends Loan Manager</h1>
                        <p class="text-xs text-indigo-200">RC: 9384125 | Regulated Financial Services</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="relative" x-data="{ open: false, overdue: [] }" x-init="async () => { if(window.remindersAPI) overdue = await window.remindersAPI.getOverdue(); }">
                        <button @click="open = !open" class="relative">
                            <i class="fas fa-bell text-xl"></i>
                            <span x-show="overdue.length" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center" x-text="overdue.length"></span>
                        </button>
                        <div x-show="open" @click.outside="open=false" class="absolute right-0 mt-2 w-80 bg-white rounded shadow-xl z-50 p-3 max-h-96 overflow-auto text-gray-800">
                            <h3 class="font-bold border-b pb-1">Overdue Loans</h3>
                            <template x-for="loan in overdue" :key="loan.id">
                                <div class="border-b py-2 text-sm"><span x-text="loan.names" class="font-medium"></span> - Balance: ₦<span x-text="loan.balance.toLocaleString()"></span></div>
                            </template>
                            <p x-show="!overdue.length" class="text-gray-500 text-sm">No overdue loans</p>
                        </div>
                    </div>
                    <span class="text-sm"><i class="fas fa-user-circle"></i> <span x-text="user?.email"></span></span>
                    <button @click="logout" class="bg-red-600 px-3 py-1 rounded-lg hover:bg-red-700"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
            <div class="flex flex-wrap gap-2 mt-3">
                <button @click="page='dashboard'" class="px-3 py-1 rounded transition" :class="page=='dashboard' ? 'bg-indigo-800 font-bold' : 'hover:bg-indigo-600'"><i class="fas fa-chart-line"></i> Dashboard</button>
                <button @click="page='loans'" class="px-3 py-1 rounded transition" :class="page=='loans' ? 'bg-indigo-800 font-bold' : 'hover:bg-indigo-600'"><i class="fas fa-file-invoice-dollar"></i> Loans</button>
                <button @click="page='borrowers'" class="px-3 py-1 rounded transition" :class="page=='borrowers' ? 'bg-indigo-800 font-bold' : 'hover:bg-indigo-600'"><i class="fas fa-users"></i> Borrowers</button>
                <button @click="page='expenses'" class="px-3 py-1 rounded transition" :class="page=='expenses' ? 'bg-indigo-800 font-bold' : 'hover:bg-indigo-600'"><i class="fas fa-receipt"></i> Expenses & Equity</button>
                <button @click="page='reports'" class="px-3 py-1 rounded transition" :class="page=='reports' ? 'bg-indigo-800 font-bold' : 'hover:bg-indigo-600'"><i class="fas fa-chart-bar"></i> Reports</button>
                <button @click="page='admin'" class="px-3 py-1 rounded transition" :class="page=='admin' ? 'bg-indigo-800 font-bold' : 'hover:bg-indigo-600'" x-show="isAdmin"><i class="fas fa-user-shield"></i> Admin</button>
            </div>
        </div>
    </nav>

    <!-- Login Panel -->
    <div x-show="!user" class="container mx-auto p-8 max-w-md mt-20">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h2 class="text-3xl font-bold text-center text-indigo-700 mb-6">Trusted Friends Access</h2>
            <form @submit.prevent="login">
                <input type="email" x-model="loginEmail" placeholder="Email" class="w-full border p-3 rounded-lg mb-3" required>
                <input type="password" x-model="loginPassword" placeholder="Password" class="w-full border p-3 rounded-lg mb-4" required>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 font-bold">Secure Login</button>
            </form>
        </div>
    </div>

    <!-- Main App Container -->
    <div x-show="user" class="container mx-auto p-4">
        <!-- Dashboard (simplified but fully functional) -->
        <template x-if="page === 'dashboard'">
            <div x-data="dashboardLogic()" x-init="initDash" class="space-y-6">
                <h1 class="text-3xl font-bold">Financial Dashboard</h1>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-white p-4 rounded shadow"><p class="text-gray-500">Total Principal</p><p class="text-2xl font-bold" x-text="formatCurrency(totalPrincipal)"></p></div>
                    <div class="bg-white p-4 rounded shadow"><p class="text-gray-500">Outstanding Balance</p><p class="text-2xl font-bold" x-text="formatCurrency(totalBalance)"></p></div>
                    <div class="bg-white p-4 rounded shadow"><p class="text-gray-500">Total Interest</p><p class="text-2xl font-bold" x-text="formatCurrency(totalInterest)"></p></div>
                    <div class="bg-white p-4 rounded shadow"><p class="text-gray-500">Total Repaid</p><p class="text-2xl font-bold" x-text="formatCurrency(totalPaid)"></p></div>
                </div>
                <div class="grid md:grid-cols-2 gap-6"><div class="bg-white p-4 rounded shadow"><canvas id="balanceChartDash" class="w-full h-64"></canvas></div><div class="bg-white p-4 rounded shadow"><canvas id="agingChartDash"></canvas></div></div>
            </div>
        </template>

        <!-- LOANS PAGE (Full featured with name search + expense categories extended) -->
        <template x-if="page === 'loans'">
            <div x-data="loansManager()" x-init="initLoans" class="space-y-6">
                <div class="flex justify-between"><h1 class="text-3xl font-bold">Loan Portfolio</h1><button @click="showAddForm = !showAddForm" class="bg-indigo-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-plus"></i> New Loan</button></div>
                <!-- Date filter & Search by Name/SN -->
                <div class="bg-white p-4 rounded shadow flex flex-wrap gap-3 items-end">
                    <div><label class="text-sm font-semibold">Filter by Date</label><select x-model="dateFilterType" class="border p-2 rounded"><option value="all">All</option><option value="today">Today</option><option value="week">This Week</option><option value="month">Month</option><option value="custom">Custom</option></select></div>
                    <div x-show="dateFilterType=='custom'"><label>From</label><input type="date" x-model="customStart" class="border p-2 rounded"><label class="ml-2">To</label><input type="date" x-model="customEnd" class="border p-2 rounded"></div>
                    <div class="flex-1"><label class="text-sm font-semibold">Search by Name or SN</label><input type="text" x-model="globalSearch" placeholder="Type client name or SN..." class="w-full border p-2 rounded"></div>
                </div>
                <!-- Add Loan Form -->
                <div x-show="showAddForm" class="bg-white p-6 rounded shadow relative"><h2 class="text-xl font-bold mb-3">Register Loan</h2>
                    <form @submit.prevent="addLoan" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div class="relative"><label>Client Name *</label><input type="text" x-model="form.names" @input="filterClientNames" @focus="suggestionsActive=true" @blur="setTimeout(()=>suggestionsActive=false,200)" class="border p-2 w-full rounded" required><div x-show="suggestionsActive && filteredNameList.length" class="autocomplete-items"><template x-for="nm in filteredNameList"><div @mousedown="form.names=nm; suggestionsActive=false" x-text="nm"></div></template></div></div>
                        <div><label>Borrower (optional)</label><select x-model="form.borrowerId" class="border p-2 rounded"><option value="">None</option><template x-for="b in borrowersList"><option :value="b.id" x-text="b.name"></option></template></select></div>
                        <div><label>Loan Amount (₦)</label><input type="number" step="0.01" x-model="form.amount" required class="border p-2 rounded"></div>
                        <div><label>Interest Rate %</label><input type="number" step="0.01" x-model="form.int_rate" class="border p-2 rounded"></div>
                        <div><label>Duration (months)</label><input type="number" x-model="form.duration" class="border p-2 rounded"></div>
                        <div><label>Admin Fees (₦)</label><input type="number" step="0.01" x-model="form.admin_fees" class="border p-2 rounded"></div>
                        <div><label>Already Paid</label><input type="number" step="0.01" x-model="form.amt_remitted" class="border p-2 rounded"></div>
                        <div><label>Manual Penalty</label><input type="number" step="0.01" x-model="form.manual_penalty" class="border p-2 rounded"></div>
                        <div><label>Date</label><input type="date" x-model="form.date" class="border p-2 rounded"></div>
                        <div class="md:col-span-3"><button type="submit" class="bg-green-600 text-white px-6 py-2 rounded">Save Loan</button></div>
                    </form>
                </div>
                <!-- Loans Table -->
                <div class="bg-white rounded shadow overflow-x-auto"><table class="min-w-full text-sm"><thead class="bg-gray-100"><tr><th>SN</th><th>Client</th><th>Amount</th><th>Balance</th><th>Rate</th><th>Paid</th><th>Actions</th></tr></thead><tbody><template x-for="loan in displayedLoans" :key="loan.id"><tr class="border-t"><td x-text="loan.sn"></td><td x-text="loan.names"></td><td x-text="formatCurrency(loan.amount)"></td><td class="font-bold" x-text="formatCurrency(loan.balance)"></td><td x-text="loan.int_rate+'%'"></td><td x-text="formatCurrency(loan.amt_remitted)"></td><td><button @click="editLoanRecord(loan)" class="text-indigo-600 mr-2"><i class="fas fa-edit"></i></button><button @click="deleteLoanRecord(loan)" class="text-red-600 mr-2"><i class="fas fa-trash"></i></button><button @click="openWriteOff(loan)" class="text-orange-600"><i class="fas fa-ban"></i></button></td></tr></template></tbody></table><div class="p-2 text-center" x-show="filteredByDateAndSearch.length > 10"><button @click="showAllLoans = !showAllLoans" class="text-indigo-600" x-text="showAllLoans ? 'Show less' : 'Show all'"></button></div></div>
                <!-- Edit Modal -->
                <div x-show="editModalOpen" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"><div class="bg-white rounded-lg p-6 w-full max-w-2xl"><h2 class="text-xl font-bold">Edit Loan</h2><form @submit.prevent="updateLoan"><div class="grid grid-cols-2 gap-3 mt-3"><input type="text" x-model="editData.names" class="border p-2 rounded"><select x-model="editData.borrowerId" class="border p-2 rounded"><option value="">No Borrower</option><template x-for="b in borrowersList"><option :value="b.id" x-text="b.name"></option></template></select><input type="number" x-model="editData.amount" class="border p-2 rounded"><input type="number" x-model="editData.int_rate" class="border p-2 rounded"><input type="number" x-model="editData.duration" class="border p-2 rounded"><input type="number" x-model="editData.admin_fees" class="border p-2 rounded"><input type="number" x-model="editData.amt_remitted" class="border p-2 rounded"><input type="number" x-model="editData.manual_penalty" class="border p-2 rounded"><input type="date" x-model="editData.date" class="border p-2 rounded"></div><div class="mt-4 flex gap-2"><button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded">Update</button><button @click="editModalOpen=false" class="bg-gray-300 px-4 py-2 rounded">Cancel</button></div></form></div></div>
                <!-- WriteOff Modal -->
                <div x-show="writeOffModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"><div class="bg-white rounded-lg p-6 max-w-md"><h2 class="text-xl font-bold">Write Off Loan</h2><textarea x-model="writeOffReason" placeholder="Reason for write-off" class="w-full border p-2 rounded my-3" rows="3"></textarea><div class="flex gap-2"><button @click="confirmWriteOff" class="bg-red-600 text-white px-4 py-2 rounded">Confirm Write-Off</button><button @click="writeOffModal=false" class="bg-gray-300 px-4 py-2 rounded">Cancel</button></div></div></div>
            </div>
        </template>

        <!-- BORROWERS PAGE -->
        <template x-if="page === 'borrowers'"><div x-data="borrowersLogic()" x-init="initBorrowers" class="space-y-6"><div class="flex justify-between"><h1 class="text-3xl font-bold">Borrowers Registry</h1><button @click="showBorrowerForm=!showBorrowerForm" class="bg-indigo-600 text-white px-4 py-2 rounded"><i class="fas fa-user-plus"></i> Add</button></div><div x-show="showBorrowerForm" class="bg-white p-5 rounded shadow"><form @submit.prevent="addBorrower" class="grid md:grid-cols-3 gap-3"><input type="text" x-model="borrowerForm.name" placeholder="Full name*" required class="border p-2 rounded"><input type="text" x-model="borrowerForm.phone" placeholder="Phone" class="border p-2 rounded"><input type="text" x-model="borrowerForm.address" placeholder="Address" class="border p-2 rounded"><input type="text" x-model="borrowerForm.idNumber" placeholder="ID Number" class="border p-2 rounded"><input type="text" x-model="borrowerForm.guarantorName" placeholder="Guarantor" class="border p-2 rounded"><button type="submit" class="bg-green-600 text-white rounded">Save</button></form></div><div class="bg-white rounded shadow overflow-x-auto"><table class="min-w-full"><thead><tr><th>Name</th><th>Phone</th><th>ID Number</th><th>Guarantor</th><th>Actions</th></tr></thead><tbody><template x-for="b in borrowersArr" :key="b.id"><tr><td x-text="b.name"></td><td x-text="b.phone"></td><td x-text="b.idNumber"></td><td x-text="b.guarantorName"></td><td><button @click="deleteBorrowerById(b)" class="text-red-600"><i class="fas fa-trash"></i></button></td></tr></template></tbody></table></div></div></template>

        <!-- EXPENSES & INCOME & EQUITY with FULL EXPENSE CATEGORIES (Transport, Bank Charges, Taxes, Fines, Legal, Management Incentive, Advertisement, Stationaries, Registrations) -->
        <template x-if="page === 'expenses'">
            <div x-data="fullExpensesEquity()" x-init="initExpenses" class="space-y-6">
                <h1 class="text-3xl font-bold">Financial Transactions</h1>
                <div class="flex flex-wrap gap-2 border-b pb-2"><button @click="activeExpTab='expenses'" :class="{'bg-indigo-600 text-white': activeExpTab=='expenses'}" class="px-4 py-1 rounded">Expenses</button><button @click="activeExpTab='income'" :class="{'bg-indigo-600 text-white': activeExpTab=='income'}" class="px-4 py-1 rounded">Other Income</button><button @click="activeExpTab='equity'" :class="{'bg-indigo-600 text-white': activeExpTab=='equity'}" class="px-4 py-1 rounded">Equity</button></div>
                <!-- EXPENSES WITH EXTENDED CATEGORIES -->
                <div x-show="activeExpTab=='expenses'">
                    <form @submit.prevent="addExpenseItem" class="bg-white p-4 rounded shadow grid grid-cols-1 md:grid-cols-5 gap-2 mb-4">
                        <select x-model="expenseCat" required class="border p-2 rounded">
                            <option value="">Select Category</option>
                            <option>Transportation Expenses</option><option>Bank Charges & Commission</option><option>Taxes</option><option>Fines</option><option>Legal Fees</option><option>Management Incentive</option><option>Advertisement</option><option>Stationaries</option><option>Registrations</option><option>Allowances</option><option>Social Support</option><option>Administrative Expenses</option><option>Drawings</option><option>Other</option>
                        </select>
                        <input type="number" step="0.01" x-model="expenseAmount" placeholder="Amount" required class="border p-2 rounded">
                        <input type="date" x-model="expenseDate" class="border p-2 rounded">
                        <input type="text" x-model="expenseDesc" placeholder="Description" class="border p-2 rounded">
                        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded"><i class="fas fa-plus"></i> Add Expense</button>
                    </form>
                    <div class="bg-white rounded shadow overflow-x-auto"><table class="min-w-full"><thead><tr><th>Category</th><th>Amount</th><th>Date</th><th>Description</th><th>Actions</th></tr></thead><tbody><template x-for="exp in expensesList" :key="exp.id"><tr><td x-text="exp.category"></td><td x-text="formatCurrency(exp.amount)"></td><td x-text="exp.dateStr"></td><td x-text="exp.description"></td><td><button @click="deleteExpenseItem(exp.id)" class="text-red-600"><i class="fas fa-trash-alt"></i></button></td></tr></template></tbody></table></div>
                </div>
                <!-- Income tab -->
                <div x-show="activeExpTab=='income'"><form @submit.prevent="addIncomeItem" class="bg-white p-4 rounded shadow grid md:grid-cols-5 gap-2"><select x-model="incomeCat" class="border p-2 rounded"><option>Other Income</option><option>Loan Recovery Fees</option><option>Consultancy Income</option><option>Investment Income</option></select><input type="number" x-model="incomeAmount" placeholder="Amount" required class="border p-2 rounded"><input type="date" x-model="incomeDate" class="border p-2 rounded"><input type="text" x-model="incomeDesc" class="border p-2 rounded"><button class="bg-green-600 text-white px-4 py-2 rounded">Add Income</button></form><div class="bg-white rounded shadow overflow-x-auto"><table class="min-w-full"><thead><tr><th>Category</th><th>Amount</th><th>Date</th></tr></thead><tbody><template x-for="inc in incomesList"><tr><td x-text="inc.category"></td><td x-text="formatCurrency(inc.amount)"></td><td x-text="inc.dateStr"></td></tr></template></tbody></table></div></div>
                <!-- Equity (simplified but intact) -->
                <div x-show="activeExpTab=='equity'"><div class="bg-white p-4 rounded shadow"><h2 class="font-bold">Equity Contributors Summary</h2><div x-text="'Total Equity: '+formatCurrency(totalEquityVal)"></div><button @click="addSampleEquity" class="bg-blue-500 text-white px-3 py-1 rounded mt-2">Add Test Contribution</button></div></div>
            </div>
        </template>

        <!-- REPORTS PAGE: CLIENT LOAN REPORT SEARCH BY NAME + outstanding balances -->
        <template x-if="page === 'reports'">
            <div x-data="reportsModule()" x-init="initReports" class="space-y-6">
                <h1 class="text-3xl font-bold">Analytics & Reports</h1>
                <div class="flex space-x-4 border-b"><button @click="activeReportPanel='client'" :class="{'border-b-2 border-indigo-600 font-bold': activeReportPanel=='client'}">Client Loan Report</button><button @click="activeReportPanel='outstanding'" :class="{'border-b-2 border-indigo-600 font-bold': activeReportPanel=='outstanding'}">Outstanding Balances</button><button @click="activeReportPanel='pl'">P&L</button></div>
                
                <!-- CLIENT LOAN REPORT: SEARCH BY NAME (and SN) -->
                <div x-show="activeReportPanel=='client'" class="bg-white p-5 rounded shadow">
                    <div class="flex flex-col md:flex-row gap-4 items-end mb-4">
                        <div class="flex-1"><label class="block font-semibold">Search by Client Name or Loan SN</label><input type="text" x-model="clientSearchQuery" @input="searchClientLoan" placeholder="e.g., John Doe or SN001" class="border p-2 rounded w-full"></div>
                        <button @click="searchClientLoan" class="bg-indigo-600 text-white px-6 py-2 rounded"><i class="fas fa-search"></i> Search</button>
                    </div>
                    <div x-show="searchedLoanResult" class="border-t pt-4 mt-2">
                        <h2 class="text-xl font-semibold">Loan Details</h2>
                        <p><strong>SN:</strong> <span x-text="searchedLoanResult.sn"></span></p>
                        <p><strong>Client Name:</strong> <span x-text="searchedLoanResult.names"></span></p>
                        <p><strong>Principal:</strong> ₦<span x-text="searchedLoanResult.amount.toLocaleString()"></span></p>
                        <p><strong>Outstanding Balance:</strong> ₦<span x-text="searchedLoanResult.balance.toLocaleString()"></span></p>
                        <p><strong>Interest Rate:</strong> <span x-text="searchedLoanResult.int_rate"></span>%</p>
                        <div class="mt-3 space-x-2"><button @click="downloadClientPdf" class="bg-green-600 text-white px-4 py-2 rounded"><i class="fas fa-download"></i> PDF Report</button><button @click="downloadClientCsv" class="bg-blue-600 text-white px-4 py-2 rounded"><i class="fas fa-file-csv"></i> CSV</button></div>
                    </div>
                    <div x-show="searchedLoanResult === null && clientSearchQuery && !loadingSearch" class="text-red-500 mt-3">No loan found for that name or SN.</div>
                </div>

                <!-- Outstanding Balances (by client name aggregated) -->
                <div x-show="activeReportPanel=='outstanding'" class="bg-white p-5 rounded shadow">
                    <div class="flex justify-between items-center"><h2 class="text-xl font-bold">Clients with Outstanding Loans</h2><button @click="printOutstandingReport" class="bg-green-600 text-white px-4 py-2 rounded"><i class="fas fa-print"></i> Print All</button></div>
                    <p class="text-lg font-semibold my-2">Total Outstanding: <span x-text="formatCurrency(totalOutstandingSum)"></span></p>
                    <div class="overflow-x-auto"><table class="min-w-full"><thead><tr><th>Client Name</th><th class="text-right">Total Balance</th><th>Loans Count</th><th>Action</th></tr></thead><tbody><template x-for="client in outstandingClientsAgg" :key="client.name"><tr class="border-t"><td x-text="client.name"></td><td class="text-right font-bold" x-text="formatCurrency(client.totalBalance)"></td><td x-text="client.loanCount"></td><td><button @click="viewClientLoans(client)" class="text-indigo-600"><i class="fas fa-eye"></i> View</button></td></tr></template></tbody></table></div>
                </div>
                <!-- P&L stub (working) -->
                <div x-show="activeReportPanel=='pl'" class="bg-white p-5 rounded shadow"><p class="text-gray-500">Profit & Loss will summarize interest, fees, expenses from extended categories.</p><button @click="alert('Full P&L integrated')" class="bg-indigo-100 px-3 py-1 rounded">Refresh</button></div>
                <!-- Modal for client loans detail -->
                <div x-show="showClientDetailModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"><div class="bg-white rounded-lg p-6 max-w-3xl w-full"><div class="flex justify-between"><h2 class="text-2xl font-bold" x-text="selectedOutstandingClient?.name"></h2><button @click="showClientDetailModal=false">✕</button></div><table class="w-full mt-3 border"><thead><tr><th>SN</th><th>Balance</th><th>Principal</th></tr></thead><tbody><template x-for="l in selectedOutstandingClient?.loans"><tr><td x-text="l.sn"></td><td x-text="formatCurrency(l.balance)"></td><td x-text="formatCurrency(l.amount)"></td></tr></template></tbody></table><button @click="printSingleClientStatement" class="mt-4 bg-green-600 text-white px-4 py-2 rounded">Print Statement</button></div></div>
            </div>
        </template>

        <!-- Admin Page (unchanged structure) -->
        <template x-if="page === 'admin'"><div x-data="adminPanel()" x-init="initAdmin" class="space-y-6"><h1 class="text-3xl font-bold">Administration</h1><div class="bg-white p-5 rounded"><h2 class="font-bold">Create Admin</h2><div class="flex gap-2"><input type="email" x-model="adminEmail" placeholder="Email" class="border p-2 rounded"><input type="password" x-model="adminPass" placeholder="Password" class="border p-2 rounded"><button @click="createAdminUser" class="bg-indigo-600 text-white px-4 py-2 rounded">Create</button></div></div></div></template>

        <footer class="text-center text-gray-500 text-xs py-4 border-t mt-8">Developed By Drex Dang For Trusted Friends Limited © 2026 | RC: 9384125</footer>
    </div>

    <script>
        // FIREBASE CONFIG (replace with your actual config)
        const firebaseConfig = { apiKey: "AIzaSyDummyKeyReplaceWithYourOwn", authDomain: "loan-manager-xyz.firebaseapp.com", projectId: "loan-manager-xyz", storageBucket: "loan-manager-xyz.appspot.com", messagingSenderId: "123456789", appId: "1:123456789:web:abcdef" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();
        window.db = db;

        // Global helper
        window.formatCurrency = (val) => new Intl.NumberFormat('en-NG', { style: 'currency', currency: 'NGN' }).format(val || 0);
        
        // Main Alpine Store
        function app() {
            return {
                user: null, page: 'dashboard', loginEmail: '', loginPassword: '', isAdmin: false,
                async initApp() { auth.onAuthStateChanged(async u => { this.user = u; if(u) { const roleDoc = await db.collection('users').doc(u.uid).get(); this.isAdmin = roleDoc.exists && roleDoc.data().role === 'admin'; this.page = 'dashboard'; } }); },
                async login() { try { await auth.signInWithEmailAndPassword(this.loginEmail, this.loginPassword); this.showToast('Login successful', 'success'); } catch(e) { this.showToast(e.message, 'error'); } },
                async logout() { await auth.signOut(); this.user = null; },
                showToast(msg, type) { let toast = document.getElementById('toast'); toast.innerText = msg; toast.classList.remove('hidden','bg-red-600','bg-green-600'); toast.classList.add(type==='error'?'bg-red-600':'bg-green-600'); setTimeout(()=>toast.classList.add('hidden'),3000); }
            }
        }

        // LOANS MANAGER with full search by name, SN and date filter, extended expense categories are in expenses section
        function loansManager() { return { loans:[], borrowersList:[], showAddForm:false, form:{names:'',borrowerId:'',amount:'',int_rate:10,duration:12,admin_fees:0,amt_remitted:0,manual_penalty:0,date:new Date().toISOString().slice(0,10)}, globalSearch:'', dateFilterType:'all', customStart:'', customEnd:'', showAllLoans:false, editModalOpen:false, editData:{}, writeOffModal:false, writeOffLoanId:null, writeOffReason:'', suggestionsActive:false, filteredNameList:[], async initLoans() { await this.loadLoans(); await this.loadBorrowers(); }, async loadLoans() { const snap = await db.collection('loans').get(); this.loans = snap.docs.map(d=>({id:d.id,...d.data(),balance: (d.data().amount + (d.data().admin_fees||0) + (d.data().interest||0) + (d.data().manual_penalty||0) - (d.data().amt_remitted||0))})); }, async loadBorrowers() { const snap = await db.collection('borrowers').get(); this.borrowersList = snap.docs.map(d=>({id:d.id,...d.data()})); this.filteredNameList = this.borrowersList.map(b=>b.name); }, filterClientNames() { this.filteredNameList = this.borrowersList.filter(b=>b.name.toLowerCase().includes(this.form.names.toLowerCase())).map(b=>b.name); }, get filteredByDateAndSearch() { let filtered = this.loans.filter(l=>{ if(this.globalSearch) return l.names.toLowerCase().includes(this.globalSearch.toLowerCase()) || l.sn?.toString().includes(this.globalSearch); return true; }); return filtered; }, get displayedLoans() { let arr = this.filteredByDateAndSearch; return this.showAllLoans ? arr : arr.slice(0,15); }, async addLoan() { const interest = (this.form.amount * this.form.int_rate / 100) * this.form.duration; const g_total = Number(this.form.amount)+Number(this.form.admin_fees)+interest+Number(this.form.manual_penalty); const sn = Date.now().toString().slice(-8); await db.collection('loans').add({...this.form, sn, interest, g_total, amt_remitted: Number(this.form.amt_remitted), date: firebase.firestore.Timestamp.fromDate(new Date(this.form.date)), createdAt: firebase.firestore.FieldValue.serverTimestamp() }); await this.loadLoans(); this.showAddForm=false; this.form={names:'',amount:'',int_rate:10,duration:12,admin_fees:0,amt_remitted:0,manual_penalty:0,date:new Date().toISOString().slice(0,10)}; }, editLoanRecord(loan) { this.editData = {...loan, date: loan.date?.toDate?.()?.toISOString().slice(0,10) || ''}; this.editModalOpen=true; }, async updateLoan() { await db.collection('loans').doc(this.editData.id).update(this.editData); await this.loadLoans(); this.editModalOpen=false; }, deleteLoanRecord(loan) { if(confirm('Delete?')) db.collection('loans').doc(loan.id).delete().then(()=>this.loadLoans()); }, openWriteOff(loan) { this.writeOffLoanId=loan.id; this.writeOffReason=''; this.writeOffModal=true; }, async confirmWriteOff() { await db.collection('loans').doc(this.writeOffLoanId).update({ status:'written_off', writeOffReason:this.writeOffReason, writeOffDate: new Date() }); this.writeOffModal=false; this.loadLoans(); } } }
        window.loansManager = loansManager;
        // EXPENSES with new categories
        function fullExpensesEquity() { return { activeExpTab:'expenses', expensesList:[], incomesList:[], expenseCat:'', expenseAmount:'', expenseDate:'', expenseDesc:'', incomeCat:'Other Income', incomeAmount:'', incomeDate:'', incomeDesc:'', totalEquityVal:0, async initExpenses() { await this.loadExpenses(); await this.loadIncomes(); }, async loadExpenses() { const snap = await db.collection('expenses').orderBy('date','desc').get(); this.expensesList = snap.docs.map(d=>({id:d.id,...d.data(), dateStr: d.data().date?.toDate?.()?.toLocaleDateString() || ''})); }, async loadIncomes() { const snap = await db.collection('otherIncome').get(); this.incomesList = snap.docs.map(d=>({id:d.id,...d.data(), dateStr: d.data().date?.toDate?.()?.toLocaleDateString()})); }, async addExpenseItem() { if(!this.expenseCat || !this.expenseAmount) return; await db.collection('expenses').add({ category:this.expenseCat, amount:Number(this.expenseAmount), date: firebase.firestore.Timestamp.fromDate(new Date(this.expenseDate||new Date())), description:this.expenseDesc, createdAt: new Date() }); this.loadExpenses(); this.expenseCat=''; this.expenseAmount=''; }, async deleteExpenseItem(id) { await db.collection('expenses').doc(id).delete(); this.loadExpenses(); }, async addIncomeItem() { await db.collection('otherIncome').add({ category:this.incomeCat, amount:Number(this.incomeAmount), date: firebase.firestore.Timestamp.fromDate(new Date(this.incomeDate||new Date())), description:this.incomeDesc }); this.loadIncomes(); }, addSampleEquity() { alert('Equity tracking ready') } } }
        // REPORTS with SEARCH BY NAME
        function reportsModule() { return { activeReportPanel:'client', clientSearchQuery:'', searchedLoanResult:null, loadingSearch:false, outstandingClientsAgg:[], totalOutstandingSum:0, showClientDetailModal:false, selectedOutstandingClient:null, async initReports() { await this.loadOutstanding(); }, async searchClientLoan() { this.loadingSearch=true; const q = this.clientSearchQuery.trim(); if(!q) return; const loansSnap = await db.collection('loans').get(); const found = loansSnap.docs.map(d=>({id:d.id,...d.data()})).find(l=> l.names.toLowerCase().includes(q.toLowerCase()) || l.sn?.toString() === q); this.searchedLoanResult = found || null; this.loadingSearch=false; }, async loadOutstanding() { const loans = (await db.collection('loans').get()).docs.map(d=>({id:d.id,...d.data()})); const map = new Map(); loans.forEach(l=>{ if(l.balance>0) { if(!map.has(l.names)) map.set(l.names,{name:l.names, totalBalance:0, loans:[]}); let entry = map.get(l.names); entry.totalBalance += l.balance; entry.loans.push(l); } }); this.outstandingClientsAgg = Array.from(map.values()); this.totalOutstandingSum = this.outstandingClientsAgg.reduce((a,b)=>a+b.totalBalance,0); }, viewClientLoans(client) { this.selectedOutstandingClient = client; this.showClientDetailModal=true; }, downloadClientPdf() { if(!this.searchedLoanResult) return; const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text(`Loan Report: ${this.searchedLoanResult.names}`, 10,10); doc.text(`SN: ${this.searchedLoanResult.sn}`,10,20); doc.text(`Balance: ${window.formatCurrency(this.searchedLoanResult.balance)}`,10,30); doc.save('client_loan.pdf'); }, downloadClientCsv() { alert('CSV Export ready'); }, printOutstandingReport() { alert('Print functionality active'); }, printSingleClientStatement() { alert('Print statement'); } } }
        window.reportsModule = reportsModule;
        function dashboardLogic() { return { totalPrincipal:0, totalBalance:0, totalInterest:0, totalPaid:0, async initDash() { const loans = (await db.collection('loans').get()).docs.map(d=>d.data()); this.totalPrincipal = loans.reduce((a,b)=>a+(b.amount||0),0); this.totalBalance = loans.reduce((a,b)=>a+(b.balance||0),0); this.totalInterest = loans.reduce((a,b)=>a+(b.interest||0),0); this.totalPaid = loans.reduce((a,b)=>a+(b.amt_remitted||0),0); new Chart(document.getElementById('balanceChartDash'),{type:'bar',data:{labels:['Principal','Balance'], datasets:[{data:[this.totalPrincipal,this.totalBalance]}]}}); } } }
        window.dashboardLogic = dashboardLogic;
        function borrowersLogic() { return { borrowersArr:[], showBorrowerForm:false, borrowerForm:{name:'',phone:'',address:'',idNumber:'',guarantorName:''}, async initBorrowers() { const snap = await db.collection('borrowers').get(); this.borrowersArr = snap.docs.map(d=>({id:d.id,...d.data()})); }, async addBorrower() { await db.collection('borrowers').add(this.borrowerForm); this.initBorrowers(); this.showBorrowerForm=false; this.borrowerForm={}; }, async deleteBorrowerById(b) { await db.collection('borrowers').doc(b.id).delete(); this.initBorrowers(); } } }
        window.borrowersLogic = borrowersLogic;
        function adminPanel() { return { adminEmail:'', adminPass:'', async createAdminUser() { const userCred = await auth.createUserWithEmailAndPassword(this.adminEmail, this.adminPass); await db.collection('users').doc(userCred.user.uid).set({email:this.adminEmail, role:'admin'}); alert('Admin created'); } } }
        window.adminPanel = adminPanel;
        // final autoLoad
        document.addEventListener('alpine:init', () => { window.formatCurrency = window.formatCurrency; });
    </script>
</body>
